# CLIProxyAPI Configuration
# 服务端口
host: ""
port: 8317

# TLS 设置 (Zeabur 会自动处理 HTTPS)
tls:
  enable: false
  cert: ""
  key: ""

# 管理 API 设置
remote-management:
  # 允许远程访问管理 API (Zeabur 部署需要开启)
  allow-remote: true
  # 管理密钥 - 请修改为强密码！
  secret-key: "your-strong-password-here"
  # 启用管理控制面板
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

# 认证目录
auth-dir: "~/.cli-proxy-api"

# API 密钥 - 客户端连接时使用
# 建议修改为你自己的密钥
api-keys:
  - "sk-cliproxy-key1"
  - "sk-cliproxy-key2"

# 调试模式
debug: false

# 日志设置
logging-to-file: false

# 启用使用统计
usage-statistics-enabled: true

# 请求重试次数
request-retry: 3

# 最大重试等待时间
max-retry-interval: 30

# 额度超限行为
quota-exceeded:
  switch-project: true
  switch-preview-model: true

# 路由策略 - 多账号轮询
routing:
  strategy: "round-robin"

# WebSocket 认证
ws-auth: false

# OAuth 账号将通过管理面板添加
# 支持: gemini-cli, vertex, aistudio, antigravity, claude, codex, qwen, iflow
